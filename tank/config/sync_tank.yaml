tank_id: sync-tank-01
host:
  bind: 0.0.0.0
  port: 5050

arm:
  backend: pca9685
  pca9685:
    address: '0x40'
    bus: 1
    frequency_hz: 50
    min_tick: 150
    max_tick: 600
  disable_pwm_after_move: false
  movement_delay_seconds: 0.35
  servos:
    lighthouse_pan:
      name: Lighthouse Pan
      channel: 0
      min_angle: 20
      max_angle: 160
      neutral_angle: 90
      min_pulse_width: 0.0005
      max_pulse_width: 0.0025
    lighthouse_tilt:
      name: Lighthouse Tilt
      channel: 1
      min_angle: 45
      max_angle: 125
      neutral_angle: 90
      min_pulse_width: 0.0005
      max_pulse_width: 0.0025
    reeflex_base:
      name: REEFLEX Base
      channel: 2
      min_angle: 20
      max_angle: 160
      neutral_angle: 90
      min_pulse_width: 0.0005
      max_pulse_width: 0.0025
    reeflex_shoulder:
      name: REEFLEX Shoulder
      channel: 3
      min_angle: 45
      max_angle: 135
      neutral_angle: 90
      min_pulse_width: 0.0005
      max_pulse_width: 0.0025
    reeflex_elbow:
      name: REEFLEX Elbow
      channel: 4
      min_angle: 35
      max_angle: 145
      neutral_angle: 90
      min_pulse_width: 0.0005
      max_pulse_width: 0.0025
  devices:
    lighthouse-001:
      type: lighthouse
      joints:
        pan: lighthouse_pan
        tilt: lighthouse_tilt
    reeflex-001:
      type: reeflex
      joints:
        base: reeflex_base
        shoulder: reeflex_shoulder
        elbow: reeflex_elbow

cameras:
  registry_path: config/cameras.json
  usb:
    snapshot_timeout_seconds: 5
    preferred_width: 1280
    preferred_height: 720
    preferred_fps: 10
  esp32:
    discovery_ranges:
      - REDACTED_PRIVATE_IP/24
      - REDACTED_PRIVATE_IP/24
    timeout_seconds: 1.5
    endpoints:
      - /stream
      - /capture
      - /jpg
      - /video
      - /cam-hi.jpg
      - /cam-lo.jpg
      - /

hub:
  enabled: false
  base_url: http://PC_LAN_IP:8765
  api_key: ""
  mode: snapshot_push
  max_fps: 1
  max_width: 1280
  jpeg_quality: 85
  timeout_seconds: 5

ingest:
  hub_id: tank-pi-001
  host_id: tank-pi-001
  host_label: TANK NODE 1
  public_url: http://TANK_ONE_WIRED_IP:8080
  camera_service_url: http://TANK_ONE_WIRED_IP:5050
  usb_feed_allowed_cidrs:
    - 127.0.0.0/8
    - REDACTED_PRIVATE_IP/24
  bind: 0.0.0.0
  port: 8080
  upload_dir: test_uploads
  layout_path: config/tank_layout.json
  node_config_path: config/node_config.json
  max_images_per_node: 500
  expected_nodes:
    - tank-cam-001
    - tank-cam-002
  allowed_nodes:
    - tank-cam-001
    - tank-cam-002
  node_angles:
    tank-cam-001: 0
    tank-cam-002: 90
